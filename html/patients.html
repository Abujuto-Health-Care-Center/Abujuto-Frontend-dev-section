<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patients | Àbójútó</title>
 <link rel="shortcut icon" href="../HTML.img/Abujuto Logo.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/sidebar.css" />
    <link rel="stylesheet" href="../css/patients.css" />
  </head>
  <body>
    <div class="container">
      <aside class="side-bar"></aside>
       <button
            class="hamburger-btn"
            id="hamburgerBtn"
            aria-label="Toggle menu"
          >
            <span></span>
            <span></span>
            <span></span>
          </button>
      <main class="main-content">
        <div class="heading-div">
          <div>
            <h1>Patient Directory</h1>
            <p>Manage and track patient information efficiently</p>
          </div>

          <form action="" onsubmit="return false">
            <div class="search-div">
              <img src="../assets/icons/assets/icons/search.png" alt="" />
              <input
                type="text"
                name="search"
                id="search"
                placeholder="Search patients"
              />
            </div>
          </form>

          <button class="add-patient-btn">
            <a href="add-patient.html"
              ><img src="../assets/icons/add-patient-icon.png" alt="" /> Add new
              patient</a
            >
          </button>
        </div>

        <div class="stat-container">
          <div class="stat-card">
            <div class="stat-icon green">
              <img src="../assets/icons/total-patients-icon.png" alt="" />
            </div>
            <div>
              <div class="stat-label">Total Patients</div>
              <div class="stat-value" id="stat-total">—</div>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-icon blue">
              <img src="../assets/icons/active-today-icon.png" alt="" />
            </div>
            <div>
              <div class="stat-label">Active Today</div>
              <div class="stat-value" id="stat-active">—</div>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-icon orange">
              <img src="../assets/icons/pending-labs.png" alt="" />
            </div>
            <div>
              <div class="stat-label">Pending Labs</div>
              <div class="stat-value" id="stat-pending">—</div>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-icon red">
              <img src="../assets/icons/in-patients.png" alt="" />
            </div>
            <div>
              <div class="stat-label">In Patient</div>
              <div class="stat-value" id="stat-inpatient">—</div>
            </div>
          </div>
        </div>

        <div class="filter-tabs">
          <button class="filter-tab active" onclick="setTab(this)">
            All Patients
          </button>
          <button class="filter-tab" onclick="setTab(this)">
            Recently Visited
          </button>
          <button class="filter-tab" onclick="setTab(this)">In-Patient</button>
          <button class="filter-tab" onclick="setTab(this)">Discharged</button>
        </div>

        <div class="patient-cards" id="patient-cards-grid">
          <!-- Cards injected by JS -->
          <div class="cards-loading">Loading patients...</div>
        </div>

        <div class="pagination" id="pagination-container">
          <span class="page-info" id="page-info">Showing patients...</span>
          <div class="pagination-controls" id="pagination-controls"></div>
        </div>
      </main>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="../js/pages/patients.js"></script>
  </body>
</html>
