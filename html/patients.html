<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patients | Àbójútó</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/sidebar.css" />
    <link rel="stylesheet" href="../css/patients.css" />
  </head>
  <body>
    <div class="container">
      <aside class="side-bar"></aside>
      <main class="main-content">
        <div class="heading-div">
          <div>
            <h1>Patient Directory</h1>
            <p>Manage and track patient information efficiently</p>
          </div>

          <form action="">
            <div class="search-div">
              <img src="../assets/icons/assets/icons/search.png" alt="" />
              <input
                type="text"
                name="search"
                id="search"
                placeholder="Search patients"
              />
            </div>
          </form>

          <button class="add-patient-btn">
            <a href="add-patient.html"
              ><img src="../assets/icons/add-patient-icon.png" alt="" /> Add new
              patient</a
            >
          </button>
        </div>

        <div class="stat-container">
            <div class="stat-card">
              <div class="stat-icon green">
                <img src="../assets/icons/total-patients-icon.png" alt="">
              </div>
              <div>
                <div class="stat-label">Total Patients</div>
                <div class="stat-value">1,284</div>
              </div>
            </div>

            <div class="stat-card">
              <div class="stat-icon blue">
                <img src="../assets/icons/active-today-icon.png" alt="">
              </div>
              <div>
                <div class="stat-label">Active Today</div>
                <div class="stat-value">42</div>
              </div>
            </div>

            <div class="stat-card">
              <div class="stat-icon orange">
                <img src="../assets/icons/pending-labs.png" alt="">
              </div>
              <div>
                <div class="stat-label">Pending Labs</div>
                <div class="stat-value">18</div>
              </div>
          </div>

            <div class="stat-card">
              <div class="stat-icon red">
                <img src="../assets/icons/in-patients.png" alt="">
              </div>
              <div>
                <div class="stat-label">In Patient</div>
                <div class="stat-value">7</div>
              </div>
          </div>


        </div>
      </main>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="../js/pages/patients.js"></script>
  </body>
</html>
